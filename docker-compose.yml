version: "3.9"

services:
  cxo:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/.cxo_data/cxo.db
    volumes:
      - cxo_data:/app/.cxo_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/auth/login', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cxo_data:
