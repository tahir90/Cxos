<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic CXO — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    *{font-family:'Inter',system-ui,sans-serif;} body{background:#0a0e1a;}
    .fade-in{animation:fadeIn .4s ease-out}
    @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm fade-in">
    <div class="text-center mb-8">
      <div class="w-14 h-14 mx-auto bg-gradient-to-br from-indigo-500 to-violet-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-indigo-500/30 mb-4">CXO</div>
      <h1 class="text-2xl font-bold text-white">Agentic CXO</h1>
      <p class="text-sm text-gray-500 mt-1">Your AI Co-Founder</p>
    </div>

    <div id="login-form" class="bg-[#111827] border border-gray-800/50 rounded-2xl p-6">
      <h2 id="form-title" class="text-lg font-semibold text-white mb-4">Sign In</h2>

      <div id="name-field" class="hidden mb-3">
        <label class="block text-[11px] text-gray-400 mb-1 font-medium uppercase tracking-wide">Name</label>
        <input id="name" type="text" class="w-full bg-[#0b0f1a] border border-gray-700/50 rounded-xl px-4 py-2.5 text-white text-sm placeholder-gray-600 focus:ring-2 focus:ring-indigo-500/40 outline-none" placeholder="Your name">
      </div>

      <div class="mb-3">
        <label class="block text-[11px] text-gray-400 mb-1 font-medium uppercase tracking-wide">Email</label>
        <input id="email" type="email" class="w-full bg-[#0b0f1a] border border-gray-700/50 rounded-xl px-4 py-2.5 text-white text-sm placeholder-gray-600 focus:ring-2 focus:ring-indigo-500/40 outline-none" placeholder="you@company.com">
      </div>

      <div class="mb-4">
        <label class="block text-[11px] text-gray-400 mb-1 font-medium uppercase tracking-wide">Password</label>
        <input id="password" type="password" class="w-full bg-[#0b0f1a] border border-gray-700/50 rounded-xl px-4 py-2.5 text-white text-sm placeholder-gray-600 focus:ring-2 focus:ring-indigo-500/40 outline-none" placeholder="Your password" onkeydown="if(event.key==='Enter')doAuth()">
      </div>

      <div id="error-msg" class="hidden mb-3 px-3 py-2 bg-red-500/10 border border-red-500/20 rounded-lg text-sm text-red-300"></div>

      <button onclick="doAuth()" id="auth-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl px-4 py-2.5 transition shadow-lg shadow-indigo-500/20">Sign In</button>

      <p class="text-center mt-4 text-sm text-gray-500">
        <span id="toggle-text">Don't have an account?</span>
        <button onclick="toggleMode()" class="text-indigo-400 hover:text-indigo-300 ml-1" id="toggle-btn">Sign Up</button>
      </p>
    </div>
  </div>

<script>
let isSignup = false;

function toggleMode() {
  isSignup = !isSignup;
  document.getElementById('form-title').textContent = isSignup ? 'Create Account' : 'Sign In';
  document.getElementById('auth-btn').textContent = isSignup ? 'Create Account' : 'Sign In';
  document.getElementById('toggle-text').textContent = isSignup ? 'Already have an account?' : "Don't have an account?";
  document.getElementById('toggle-btn').textContent = isSignup ? 'Sign In' : 'Sign Up';
  document.getElementById('name-field').classList.toggle('hidden', !isSignup);
  document.getElementById('error-msg').classList.add('hidden');
}

async function doAuth() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const name = document.getElementById('name').value.trim();
  const errEl = document.getElementById('error-msg');
  errEl.classList.add('hidden');

  if (!email || !password) {
    errEl.textContent = 'Please fill in all fields';
    errEl.classList.remove('hidden');
    return;
  }

  const endpoint = isSignup ? '/auth/signup' : '/auth/login';
  const body = isSignup ? {email, password, name} : {email, password};

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const data = await res.json();

    if (res.ok && data.token) {
      localStorage.setItem('cxo_token', data.token);
      localStorage.setItem('cxo_user', JSON.stringify(data.user));
      window.location.href = '/';
    } else {
      errEl.textContent = data.detail || data.error || 'Authentication failed';
      errEl.classList.remove('hidden');
    }
  } catch(e) {
    errEl.textContent = 'Connection error';
    errEl.classList.remove('hidden');
  }
}

if (localStorage.getItem('cxo_token')) {
  window.location.href = '/';
}
</script>
</body>
</html>
