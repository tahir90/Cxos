name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest tests -v --tb=short
        env:
          CXO_ENV: test
          OPENAI_API_KEY: ""
          CXO_JWT_SECRET: test-secret-for-ci
          CXO_ADMIN_PASSWORD: test-admin-password
