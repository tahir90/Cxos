# Fly.io deployment config
# Deploy: fly launch → fly deploy

app = "agentic-cxo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = "8000"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
